<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-camera-retro"></i>
        <span>Image Finder</span>
      </div>

      <div class="nav-actions">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </nav>

    <header class="hero">
      <h1>Discover Stunning Images</h1>
      <p>Search beautiful photos instantly with a modern interactive gallery.</p>

      <form id="search-form">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input
            type="text"
            id="search-input"
            placeholder="Search for images..."
            autocomplete="off"
          />
          <button id="search-button" type="submit">Search</button>
        </div>
      </form>
    </header>

    <main class="main-container">
      <section class="status-section">
        <div id="loader" class="loader"></div>
        <p id="error-message" class="error-message"></p>
      </section>

      <section class="section-title-wrap">
        <h2><i class="fa-solid fa-image"></i> Search Results</h2>
      </section>

      <div class="search-results"></div>

      <section class="favorites-section">
        <div class="section-title-wrap">
          <h2><i class="fa-solid fa-heart"></i> Favorites</h2>
        </div>
        <div id="favorites-container" class="favorites-container"></div>
      </section>
    </main>

    <div id="image-modal" class="modal">
      <div class="modal-content">
        <span id="close-modal" class="close-modal">&times;</span>
        <img id="modal-img" src="" alt="Preview" />
      </div>
    </div>


    <script src="index.js"></script>
  </body>
</html>
